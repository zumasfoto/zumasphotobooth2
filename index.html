<!doctype html>
<html lang="it">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Foto Sessione</title>
    <style>
        :root { color-scheme: dark; }
        body { margin: 0; font-family: system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; background:#0b0f16; color: rgba(255,255,255,.92); }
        .wrap { max-width: 1100px; margin: 0 auto; padding: 18px; display: grid; gap: 12px; }
        .card { border: 1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.05); border-radius: 14px; padding: 12px; }
        .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; justify-content:space-between; }
        .btn { border:1px solid rgba(255,255,255,.14); background: rgba(255,255,255,.06); color: rgba(255,255,255,.92); padding:10px 12px; border-radius:12px; font-weight:700; cursor:pointer; }
        .btn.primary { background: rgba(59,130,246,.35); border-color: rgba(59,130,246,.55); }
        .muted { color: rgba(255,255,255,.68); font-size: 13px; }
        .grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; }
        .item { border:1px solid rgba(255,255,255,.10); background: rgba(0,0,0,.18); border-radius: 14px; overflow:hidden; display:grid; text-decoration: none; color: inherit; }
        .item img { width:100%; aspect-ratio: 3 / 2; object-fit: cover; display:block; background:#000; }
        .meta { padding: 10px; display:grid; gap: 8px; }
        .tag { font-size: 12px; font-weight: 800; letter-spacing:.2px; color: rgba(255,255,255,.86); }
        a.link { color: rgba(147,197,253,.95); text-decoration: none; word-break: break-all; }
        a.link:hover { text-decoration: underline; }
        .warn { color: rgba(251,191,36,.95); font-weight: 800; }
        input { width: 100%; padding: 10px 12px; border-radius: 12px; border:1px solid rgba(255,255,255,.14); background: rgba(0,0,0,.25); color: rgba(255,255,255,.92); }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="card">
            <div class="row">
                <div>
                    <div style="font-weight:900; letter-spacing:.2px;">Foto della sessione</div>
                    <div id="status" class="muted">Caricamento…</div>
                </div>
                <div style="display:flex; gap:10px; flex-wrap:wrap;">
                    <button id="refreshBtn" class="btn" type="button">Aggiorna</button>
                    <button id="dlAllBtn" class="btn primary" type="button">Scarica tutte</button>
                </div>
            </div>
            <div style="height:10px"></div>
            <div class="muted">Manifest URL:</div>
            <input id="manifestInput" placeholder="Apri con ?m=... oppure incolla qui" />
        </div>

        <div id="expiredCard" class="card" style="display:none;">
            <div class="warn">Sessione scaduta</div>
            <div class="muted">Questi contenuti erano disponibili solo per un periodo limitato.</div>
        </div>

        <div id="grid" class="grid"></div>

        <div class="card muted">
            Nota: “Scarica tutte” avvia download multipli. Alcuni browser potrebbero chiedere conferma o bloccarli.
        </div>
    </div>

    <script>
        const qs = new URLSearchParams(location.search);
        const manifestInput = document.getElementById('manifestInput');
        const statusEl = document.getElementById('status');
        const grid = document.getElementById('grid');
        const expiredCard = document.getElementById('expiredCard');
        const refreshBtn = document.getElementById('refreshBtn');
        const dlAllBtn = document.getElementById('dlAllBtn');

        let lastManifest = null;

        function setStatus(text) { statusEl.textContent = text; }

        function getManifestUrl() {
            let v = (qs.get('m') || manifestInput.value || '').trim();
            if (!v) return '';
            for (let i = 0; i < 2; i++) {
                if (v.startsWith('http://') || v.startsWith('https://')) return v;
                if (!/%[0-9A-Fa-f]{2}/.test(v)) return v;
                try { v = decodeURIComponent(v); } catch { return v; }
            }
            return v;
        }

        function getSingleUrl() {
            let v = (qs.get('u') || qs.get('url') || '').trim();
            if (!v) return '';
            for (let i = 0; i < 2; i++) {
                if (v.startsWith('http://') || v.startsWith('https://')) return v;
                if (!/%[0-9A-Fa-f]{2}/.test(v)) return v;
                try { v = decodeURIComponent(v); } catch { return v; }
            }
            return v;
        }

        function makeDownloadUrl(url) {
            const u = String(url || '');
            if (!u) return '';
            if (u.includes('/image/upload/') && !u.includes('/image/upload/fl_attachment')) {
                return u.replace('/image/upload/', '/image/upload/fl_attachment/');
            }
            return u;
        }

        function renderSingle(url) {
            lastManifest = { items: [{ type: 'final', url, createdAt: Date.now() }] };
            grid.innerHTML = '';
            expiredCard.style.display = 'none';
            setStatus('Foto pronta');

            const card = document.createElement('a');
            card.className = 'item';
            card.href = url;
            card.target = '_blank';
            card.rel = 'noopener noreferrer';

            const img = document.createElement('img');
            img.loading = 'eager';
            img.alt = 'Foto';
            img.src = url;

            const meta = document.createElement('div');
            meta.className = 'meta';

            const tag = document.createElement('div');
            tag.className = 'tag';
            tag.textContent = 'Foto';

            const dl = document.createElement('a');
            dl.className = 'link';
            dl.href = makeDownloadUrl(url);
            dl.target = '_blank';
            dl.rel = 'noopener noreferrer';
            dl.textContent = 'Scarica';

            meta.appendChild(tag);
            meta.appendChild(dl);
            card.appendChild(img);
            card.appendChild(meta);
            grid.appendChild(card);

            refreshBtn.disabled = true;
            dlAllBtn.textContent = 'Scarica';
            dlAllBtn.onclick = () => {
                const a = document.createElement('a');
                a.href = makeDownloadUrl(url);
                a.target = '_blank';
                a.rel = 'noopener noreferrer';
                document.body.appendChild(a);
                a.click();
                a.remove();
            };
        }

        function sortItems(items) {
            const rank = { original: 1, layout: 2, final: 3, ai: 4 };
            return [...items].sort((a, b) => {
                const ra = rank[a.type] || 99;
                const rb = rank[b.type] || 99;
                if (ra !== rb) return ra - rb;
                return (a.createdAt || 0) - (b.createdAt || 0);
            });
        }

        function render(manifest) {
            lastManifest = manifest;
            grid.innerHTML = '';
            expiredCard.style.display = 'none';

            const now = Date.now();
            const expiresAt = Number(manifest.expiresAt || 0);
            if (expiresAt && Number.isFinite(expiresAt) && now > expiresAt) {
                expiredCard.style.display = 'block';
            }

            const items = Array.isArray(manifest.items) ? sortItems(manifest.items) : [];
            const title = manifest.eventName ? `Evento: ${manifest.eventName}` : 'Evento';
            const sid = manifest.sessionId ? `Sessione: ${manifest.sessionId}` : '';
            setStatus(`${title}${sid ? ' • ' + sid : ''} • ${items.length} file`);

            if (items.length === 0) {
                const msg = document.createElement('div');
                msg.className = 'card muted';
                msg.textContent = 'Nessuna foto trovata in questa sessione. Rigenera il QR dopo aver fatto almeno uno scatto (e aver raggiunto la schermata Finale).';
                grid.appendChild(msg);
                return;
            }

            for (const it of items) {
                const url = String(it.url || '');
                if (!url) continue;

                const type = String(it.type || 'file');
                const name = type === 'original' ? 'Originale' :
                    type === 'layout' ? 'Layout' :
                        type === 'final' ? 'Finale' :
                            type === 'ai' ? 'IA' : type;

                const card = document.createElement('a');
                card.className = 'item';
                card.href = url;
                card.target = '_blank';
                card.rel = 'noopener noreferrer';

                const img = document.createElement('img');
                img.loading = 'lazy';
                img.alt = name;
                img.src = url;

                const meta = document.createElement('div');
                meta.className = 'meta';

                const tag = document.createElement('div');
                tag.className = 'tag';
                tag.textContent = name;

                const dl = document.createElement('a');
                dl.className = 'link';
                dl.href = url;
                dl.download = '';
                dl.textContent = 'Download';

                meta.appendChild(tag);
                meta.appendChild(dl);

                card.appendChild(img);
                card.appendChild(meta);
                grid.appendChild(card);
            }
        }

        function loadManifestFromScript(url) {
            return new Promise((resolve, reject) => {
                window.__pbManifest = null;
                const s = document.createElement('script');
                s.async = true;
                s.src = url + (url.includes('?') ? '&' : '?') + 'cb=' + Date.now();
                const timeout = setTimeout(() => {
                    s.remove();
                    reject(new Error('timeout'));
                }, 6000);
                s.onload = () => {
                    clearTimeout(timeout);
                    const m = window.__pbManifest;
                    s.remove();
                    if (m && typeof m === 'object') resolve(m);
                    else reject(new Error('no_manifest'));
                };
                s.onerror = () => {
                    clearTimeout(timeout);
                    s.remove();
                    reject(new Error('script_error'));
                };
                document.head.appendChild(s);
            });
        }

        function parseManifestText(text) {
            const t = String(text || '').trim();
            if (!t) throw new Error('empty');
            if (t.startsWith('window.__pbManifest')) {
                let s = t.replace(/^window\.__pbManifest\s*=\s*/, '');
                s = s.replace(/;\s*$/, '');
                return JSON.parse(s);
            }
            return JSON.parse(t);
        }

        async function fetchText(url) {
            const res = await fetch(url, { cache: 'no-store' });
            if (!res.ok) throw new Error(`http_${res.status}`);
            return await res.text();
        }

        async function loadManifest() {
            const single = getSingleUrl();
            if (single) {
                manifestInput.value = single;
                renderSingle(single);
                return;
            }

            const url = getManifestUrl();
            if (!url) {
                setStatus('Incolla un manifestUrl oppure apri con ?m=...');
                return;
            }
            manifestInput.value = url;
            setStatus('Carico…');

            // 1) Prova via <script> (utile quando il manifest è JS: window.__pbManifest=...)
            try {
                const data = await loadManifestFromScript(url);
                render(data);
                return;
            } catch { }

            // 2) Prova fetch diretto come testo (JSON oppure JS) e parsing
            try {
                const text = await fetchText(url);
                const data = parseManifestText(text);
                render(data);
                return;
            } catch { }

            // 3) Fallback CORS via proxy pubblico
            try {
                setStatus('Carico (fallback)…');
                const proxy = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
                const text = await fetchText(proxy);
                const data = parseManifestText(text);
                render(data);
                return;
            } catch {
                setStatus('Errore nel caricamento del manifest.');
            }
        }

        async function downloadAll() {
            if (!lastManifest || !Array.isArray(lastManifest.items)) return;
            const urls = lastManifest.items.map((x) => String(x.url || '')).filter(Boolean);
            for (const url of urls) {
                const a = document.createElement('a');
                a.href = url;
                a.download = '';
                document.body.appendChild(a);
                a.click();
                a.remove();
                await new Promise((r) => setTimeout(r, 200));
            }
        }

        refreshBtn.addEventListener('click', loadManifest);
        dlAllBtn.addEventListener('click', downloadAll);

        loadManifest();
    </script>
</body>
</html>
